<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>BestIAle Primitive</title>

<style>
body {
    margin: 0;
    background: #222;
}

canvas {
    display: block;
    margin: auto;
    background: #111;
}
</style>
</head>

<body>

<canvas id="world" width="800" height="500"></canvas>

<script>

const canvas = document.getElementById("world");
const ctx = canvas.getContext("2d");

let foods = [];

for(let i=0;i<200;i++){
    foods.push({
        x: Math.random()*canvas.width,
        y: Math.random()*canvas.height
    });
}

let bestiale = {
    x: 400,
    y: 250,
    energy: 100
};

function distance(a,b){
    return Math.hypot(a.x-b.x,a.y-b.y);
}

function findClosestFood() {

    let closest = null;
    let bestDistance = Infinity;

    for(let food of foods){

        let d = distance(bestiale, food);

        if(d > 100){
            continue;
        }

        if(d < bestDistance){
            bestDistance = d;
            closest = food;
        }
    }

    return closest;
}

function update(){

    if(bestiale.energy <= 0){
        return;
    }

    bestiale.energy -= 0.1;

   let target = findClosestFood();

if(target){

    let dx = target.x - bestiale.x;
    let dy = target.y - bestiale.y;

    let length = Math.hypot(dx, dy);

    if(length > 0){

        bestiale.x += dx / length * 2;
        bestiale.y += dy / length * 2;
    }

}
else{

    bestiale.x += (Math.random()-0.5)*4;
    bestiale.y += (Math.random()-0.5)*4;

}

    bestiale.x = Math.max(0,Math.min(canvas.width,bestiale.x));
    bestiale.y = Math.max(0,Math.min(canvas.height,bestiale.y));

    for(let i=foods.length-1;i>=0;i--){

        if(distance(bestiale,foods[i]) < 10){

            bestiale.energy += 20;

            foods.splice(i,1);

            foods.push({
                x: Math.random()*canvas.width,
                y: Math.random()*canvas.height
            });
        }
    }
}

function draw(){

    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let food of foods){

        ctx.fillStyle="lime";

        ctx.fillRect(
            food.x-3,
            food.y-3,
            6,
            6
        );
    }

    if(bestiale.energy > 0){

        ctx.fillStyle="red";

        ctx.fillRect(
            bestiale.x-5,
            bestiale.y-5,
            10,
            10
        );
    }

    ctx.fillStyle="white";
    ctx.font="20px Arial";

    ctx.fillText(
        "Energy : " + Math.round(bestiale.energy),
        10,
        25
    );
}

function loop(){

    update();
    draw();

    requestAnimationFrame(loop);
}

loop();

</script>

</body>
</html>
